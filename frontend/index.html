<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fason - Control Panel</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="preloader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#09090b;transition:opacity .3s ease">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
          <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#863bff"/>
            <path d="M9 9h14v3.5H13.5v4H21v3.5h-7.5V27H9V9z" fill="white"/>
            <circle cx="23" cy="8.75" r="1.5" fill="#47bfff"/>
            <circle cx="22" cy="20.75" r="1.2" fill="#47bfff" opacity="0.7"/>
          </svg>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <span style="color:#fafafa;font-family:Inter,system-ui,sans-serif;font-size:14px;font-weight:600">Fason</span>
            <div style="width:80px;height:2px;border-radius:1px;background:#27272a;overflow:hidden">
              <div style="width:40%;height:100%;border-radius:1px;background:#863bff;animation:preloader-slide 1.2s ease-in-out infinite"></div>
            </div>
          </div>
        </div>
      </div>
      <style>@keyframes preloader-slide{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(-100%)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
