name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to Docker Hub'
        required: true
        default: false
        type: boolean

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.push_image == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.event.inputs.push_image == 'true' && format('{0}/{1}', secrets.DOCKERHUB_USERNAME, steps.version.outputs.repo_name) || steps.version.outputs.repo_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build Summary
        run: |
          echo "Repository   : ${{ github.event.repository.name }}"
          echo "Image Name   : ${{ steps.version.outputs.repo_name }}"
          echo "Version      : ${{ steps.version.outputs.version }}"
          echo "Push to Hub  : ${{ github.event.inputs.push_image }}"
          echo "Dockerfile   : docker/Dockerfile"
          echo ""
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"

      - name: Prepare .dockerignore
        run: cp docker/.dockerignore .dockerignore

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event.inputs.push_image == 'true' }}
          load: ${{ github.event.inputs.push_image != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Update Docker Hub Overview
        if: ${{ github.event.inputs.push_image == 'true' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ format('{0}/{1}', secrets.DOCKERHUB_USERNAME, steps.version.outputs.repo_name) }}
          readme-filepath: ./README.md
