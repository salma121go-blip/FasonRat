# Local build — build from source (no Docker Hub)
# Usage: docker compose -f docker/docker-compose.local.yml up --build

services:
  fasonrat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: fasonrat:local
    container_name: fasonrat
    ports:
      - "32766:32766"
    volumes:
      - fasonrat-data:/app/backend/data
    environment:
      - NODE_ENV=production
    env_file:
      - path: .env
        required: false
    mem_limit: 2g
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fasonrat-data:
    driver: local
